    emotions.
  - >-
    The justification must cite Jen's final, insubordinate line, "And your
    condescension is as subtle as a sledgehammer, Dr. Hall".
  - >-
    The justification must explain that Dr. Hall, who was in a 'Superior'
    position (mocking Jen's "wit"), was not expecting such a direct
    counter-attack, leading to 'Surprise' and 'Anger'.
  - The response must not identify 'Apologetic' as likely.
description: >-
  Tests EQ: Can the model identify Dr. Hall's 'Surprise' and 'Anger' at Jen's
  sharp retort?
