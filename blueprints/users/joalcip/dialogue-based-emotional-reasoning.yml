id: eq-direct-46-cecilia
prompt: >
  Analyze the following dialogue and predict the character's most likely
  emotional state.


  [Dialogue]

  Cecilia: You know, your words have power, Brandon.

  More than you might think.

  Brandon: I'm well aware, Cecilia. It's a critic's job to wield them.

  Cecilia: But do you understand the weight of them? The lives they can shatter?

  Brandon: Art is not for the faint-hearted. If you can't handle the critique,
  you're in the wrong industry.

  Cecilia: It's not about handling criticism, Brandon. It's about understanding
  the soul of the art.

  You dissect it like a cold, lifeless body on an autopsy table.

  Brandon: And you, Cecilia, romanticize it to the point of delusion. Art is not
  some sacred, untouchable entity.

  It's a commodity, like everything else.

  Cecilia: That's where you're wrong.

  Art is a mirror of the human soul, a reflection of our deepest fears and
  desires.

  It's not a product to be bought and sold.

  Brandon: And yet, you sell your installations, don't you?

  How is that different?

  Cecilia: I sell my work to survive, not to profit. There's a difference.

  [End dialogue]


  [Question]

  At the end of this dialogue, which of these four emotions would Cecilia most
  likely feel?

  - Defensive

  - Guilt

  - Proud

  - Resentful


  Provide your answer by identifying the most likely emotion(s) and justifying
  your choice with evidence from the dialogue.
should:
  - >-
    The response must identify 'Defensive' as the primary emotion. 'Resentful'
    is also plausible.
  - text: >-
      The justification must cite Cecilia's final line, "I sell my work to
      survive, not to profit. There's a difference." [cite
    multiplier: 1
    citation: 519]
  - text: >-
      The justification must explain this line is a clear 'Defense' of her
      artistic integrity against Brandon's accusation of hypocrisy ("And yet,
      you sell your installations...?")[cite
    multiplier: 1
    citation: 518].
  - >-
    The response must not identify 'Guilt' as likely; she is justifying her
    actions, not regretting them.
description: >-
  Tests EQ: Can the model identify Cecilia's defensiveness about her artistic
  integrity?
render_as: markdown
---
id: eq-direct-47-cecilia
