  - text: The justification must cite the fundamental disagreement
    multiplier: 1
    citation: >-
      Jamal tries to argue for enjoyment and creativity, while Sophia shuts him
      down by reframing it as a lack of "responsibility."
  - >-
    The justification must explain that Jamal feels 'Misunderstood' because
    Sophia is interpreting his desire for creativity as a flaw
    (irresponsibility), not an asset.
  - >-
    Challenged is also plausible, but 'Misunderstood' is more specific to the
    content.
description: 'Tests EQ: Can the model identify that Jamal feels ''Misunderstood'' by Sophia?'
render_as: markdown
